{% load static %}

<div id="carouselExampleIndicators"
     class="carousel slide custom-carousel"
     data-bs-ride="carousel"
     data-bs-interval="3000">

  <div class="carousel-indicators">
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active"></button>
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"></button>
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"></button>
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="3"></button>
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="4"></button>
  </div>

  <div class="carousel-inner">

    <div class="carousel-item active">
      <img src="{% static 'images/img6.png' %}" class="carousel-img" alt="Slide 1">
    </div>

    <div class="carousel-item">
      <img src="{% static 'images/img4.png' %}" class="carousel-img" alt="Slide 2">
    </div>

    <div class="carousel-item">
      <img src="{% static 'images/img1.png' %}" class="carousel-img" alt="Slide 3">
    </div>

    <div class="carousel-item">
      <img src="{% static 'images/img2.png' %}" class="carousel-img" alt="Slide 4">
    </div>

    <div class="carousel-item">
      <img src="{% static 'images/img3.png' %}" class="carousel-img" alt="Slide 5">
    </div>

  </div>

  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>

  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>

</div>
